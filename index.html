<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuickMart — Groceries delivered in 10 minutes</title>
  <link rel="stylesheet" href="store.css">
</head>
<body>
  <!-- Top Bar -->
  <header class="topbar">
    <div class="topbar-inner">
      <div class="topbar-left">
        <a href="/" class="brand">
          <span class="brand-icon">⚡</span>
          <span class="brand-name">QuickMart</span>
        </a>
        <div class="location">
          <span class="loc-label">Delivery in</span>
          <strong class="loc-time">10 minutes</strong>
          <span class="loc-addr">📍 Patiala, Punjab</span>
        </div>
      </div>
      <div class="topbar-center">
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input type="text" id="searchInput" placeholder="Search for atta, dal, coke and more...">
        </div>
      </div>
      <div class="topbar-right">
        <button class="cart-btn" id="cartBtn" onclick="toggleCart()">
          <span class="cart-icon">🛒</span>
          <span class="cart-label">Cart</span>
          <span class="cart-count" id="cartCount">0</span>
        </button>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="content">
    <!-- Home View -->
    <div id="viewHome" class="view active">
      <div class="hero-banner">
        <div class="hero-card hero-main">
          <div class="hero-text">
            <h1>Grocery &amp; essentials</h1>
            <p>delivered in <strong>10 minutes</strong></p>
          </div>
          <span class="hero-emoji">🛒</span>
        </div>
        <div class="hero-card hero-offer">
          <span class="hero-emoji">🏷️</span>
          <div class="hero-text">
            <h2>Flat 10% OFF</h2>
            <p>on first 3 orders</p>
          </div>
        </div>
      </div>

      <h2 class="section-title">Shop by category</h2>
      <div class="cat-grid" id="catGrid"></div>

      <h2 class="section-title" id="featuredTitle">Featured products</h2>
      <div class="prod-grid" id="featuredGrid"></div>
    </div>

    <!-- Category View -->
    <div id="viewCategory" class="view">
      <div class="cat-page">
        <aside class="cat-sidebar" id="catSidebar"></aside>
        <div class="cat-products">
          <h2 class="section-title" id="catTitle"></h2>
          <div class="prod-grid" id="catProdGrid"></div>
        </div>
      </div>
    </div>

    <!-- Search Results -->
    <div id="viewSearch" class="view">
      <h2 class="section-title" id="searchTitle">Search results</h2>
      <div class="prod-grid" id="searchGrid"></div>
    </div>

    <!-- Checkout View -->
    <div id="viewCheckout" class="view">
      <div class="checkout-page">
        <div class="checkout-form">
          <h2>Delivery details</h2>
          <form id="checkoutForm">
            <div class="ck-field"><label>Full Name</label><input type="text" id="ckName" required></div>
            <div class="ck-field"><label>Phone Number</label><input type="tel" id="ckPhone" required pattern="[0-9]{10}" placeholder="10-digit mobile"></div>
            <div class="ck-field"><label>Delivery Address</label><textarea id="ckAddr" rows="3" required placeholder="House no., Street, Area, City"></textarea></div>
            <div class="ck-field"><label>Pincode</label><input type="text" id="ckPin" pattern="[0-9]{6}" placeholder="6-digit pincode"></div>
            <div class="ck-field">
              <label>Payment Method</label>
              <div class="pay-options">
                <label class="pay-opt"><input type="radio" name="payMode" value="Cash" checked> Cash on Delivery</label>
                <label class="pay-opt"><input type="radio" name="payMode" value="UPI"> UPI (PhonePe / GPay)</label>
                <label class="pay-opt"><input type="radio" name="payMode" value="Card"> Credit / Debit Card</label>
              </div>
            </div>
            <button type="submit" class="btn-place-order">Place Order</button>
          </form>
        </div>
        <div class="checkout-summary" id="checkoutSummary"></div>
      </div>
    </div>

    <!-- Order Tracking View -->
    <div id="viewTracker" class="view">
      <div class="tracker-page" id="trackerContent"></div>
    </div>
  </main>

  <!-- Cart Drawer -->
  <div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>
  <aside class="cart-drawer" id="cartDrawer">
    <div class="cart-header">
      <h3>🛒 My Cart</h3>
      <button class="cart-close" onclick="toggleCart()">&times;</button>
    </div>
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-footer" id="cartFooter"></div>
  </aside>

  <script src="store.js"></script>
</body>
</html>
